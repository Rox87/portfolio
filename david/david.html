<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>David vs Golias - Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="bg-gradient"></div>

    <!-- Main Content -->
    <button id="openModal" class="open-btn">Ver Projeto</button>

    <!-- Modal Popup -->
    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-content">
            <button id="closeModal" class="close-btn">&times;</button>
            <div class="video-container">
                <video id="portfolioVideo" playsinline>
                    <source src="david_vencer_golias.mp4" type="video/mp4">
                    Seu navegador não suporta vídeos.
                </video>
            </div>
        </div>
    </div>

    <script>
        const overlay = document.getElementById('modalOverlay');
        const content = document.querySelector('.modal-content');
        const openBtn = document.getElementById('openModal');
        const closeBtn = document.getElementById('closeModal');
        const video = document.getElementById('portfolioVideo');

        function openModal() {
            overlay.classList.add('active');
            video.play().catch(e => console.log("Auto-play blocked, user interaction needed."));
        }

        function closeModal() {
            overlay.classList.remove('active');
            video.pause();
            video.currentTime = 0;
        }

        openBtn.addEventListener('click', openModal);
        closeBtn.addEventListener('click', closeModal);

        // Close on click outside content
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeModal();
        });

        // Auto-open with fluid delay
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(openModal, 800);
        });
    </script>
</body>

</html>
